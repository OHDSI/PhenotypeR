name: Generate and Deploy Shiny App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: write

    env:
      USE_BUNDLED_LIBUV: 1
      OMOP_DATA_FOLDER: ${{ github.workspace }}/omop

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-22.04, r: '4.3.3'}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install libuv system dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install binary DuckDB
        run: |
          codename <- system("lsb_release -c -s", intern = TRUE)
          rspm_url <- paste0("https://packagemanager.posit.co/cran/__linux__/", codename, "/latest")
          options(repos = c(RSPM = rspm_url))
          install.packages("duckdb")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
             any::rcmdcheck
             any::omock
          needs: check

      - name: Download Mock Dataset
        run: |
          options(timeout = 600)
          if (!dir.exists(Sys.getenv("OMOP_DATA_FOLDER"))) {
            dir.create(Sys.getenv("OMOP_DATA_FOLDER"), recursive = TRUE)
          }
          omock::downloadMockDataset(datasetName = "GiBleed", path = Sys.getenv("OMOP_DATA_FOLDER"))
          omock::downloadMockDataset(datasetName = "synpuf-1k_5.3", path = Sys.getenv("OMOP_DATA_FOLDER"))
          omock::downloadMockDataset(datasetName = "synthea-covid19-200k", path = Sys.getenv("OMOP_DATA_FOLDER"))
        shell: Rscript {0}

      - name: Install PhenotypeR from branch
        if: github.event_name == 'pull_request'
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF##*/}}
          echo "Current branch: $BRANCH_NAME"
          Rscript -e "pak::pkg_install('ohdsi/PhenotypeR@$BRANCH_NAME')"

      - name: install PhenotypeR from main
        if: github.event_name != 'pull_request'
        run: |
          Rscript -e 'pak::pkg_install("ohdsi/PhenotypeR")'

      - name: Force working version of fs
        run: Rscript -e 'pak::pkg_install("fs@2.0.1")'

      - name: Create shiny app
        run: Rscript extras/createShiny.R

      - name: Create renv file
        run: Rscript -e 'renv::init()'
        working-directory: PhenotypeRShiny/

      - name: Deploy test shiny to shinyapps.io
        if: github.event_name == 'pull_request'
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: Rscript extras/testShiny.R

      - name: Deploy shiny to shinyapps.io
        if: github.event_name != 'pull_request'
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: Rscript extras/docShiny.R
